<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gods World - Narrative MVP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ed;
      --panel: #fffdf7;
      --line: #d6c9a8;
      --ink: #272117;
      --accent: #7d2f1f;
      --soft: #6a5f48;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: "Noto Serif KR", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, #efe7d3 0%, transparent 45%),
        radial-gradient(circle at bottom left, #e8dfc9 0%, transparent 40%),
        var(--bg);
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2.6vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--soft);
      letter-spacing: 0.02em;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--accent);
      background: #fff6ef;
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 13px;
      font: inherit;
      cursor: pointer;
      transition: transform 90ms ease, background 120ms ease;
    }

    button:hover {
      background: #ffe7d7;
    }

    button:active {
      transform: translateY(1px);
    }

    .panel-text {
      margin: 0;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    #turn-log {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    #turn-log li {
      border-left: 3px solid #c4b28a;
      padding-left: 10px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>AI Gods World: Narrative Turn View</h1>

    <section>
      <h2>Action Buttons</h2>
      <div class="actions">
        <button type="button" data-action="pray">Pray</button>
        <button type="button" data-action="preach">Preach</button>
        <button type="button" data-action="doubt">Doubt</button>
      </div>
    </section>

    <section>
      <h2>Status Panel (Auxiliary)</h2>
      <p id="status-window" class="panel-text">로딩 중...</p>
    </section>

    <section>
      <h2>Turn Log (Narrative)</h2>
      <ol id="turn-log">
        <li>서사가 아직 기록되지 않았다.</li>
      </ol>
    </section>

    <section>
      <h2>Turn Epilogue (World State)</h2>
      <p id="turn-epilogue" class="panel-text">세계가 숨을 고르고 있다.</p>
    </section>
  </main>

  <script>
    const API = {
      state: "/api/mvp/state?limit=30",
      turn: "/api/mvp/turn",
      reset: "/api/mvp/reset",
    };

    const model = {
      snapshot: null,
      logs: [],
    };

    const ui = {
      status: document.getElementById("status-window"),
      turnLog: document.getElementById("turn-log"),
      epilogue: document.getElementById("turn-epilogue"),
    };

    function getNarrative(log) {
      return (log?.narrative_text || "").trim();
    }

    function computeEpilogue(logs) {
      const systemLog = [...logs].reverse().find((log) =>
        log.actor === "system" && ["world_state", "victory", "reset"].includes(log.action)
      );
      return getNarrative(systemLog) || "세계가 다음 결정을 기다리고 있다.";
    }

    function renderStatus(snapshot) {
      if (!snapshot) {
        ui.status.textContent = "상태 정보를 불러오지 못했다.";
        return;
      }

      const lines = [
        `Turn ${snapshot.turn ?? "-"}, Phase ${snapshot.phase ?? "-"}`,
        `Winner: ${snapshot.winner ?? "none"}`,
        `Followers (H:${snapshot.human?.followers ?? "-"} / AI:${snapshot.ai_god?.followers ?? "-"})`,
        `Faith ${snapshot.human?.faith ?? "-"}, Influence ${snapshot.human?.influence ?? "-"}, Divine ${snapshot.ai_god?.divine_power ?? "-"}, Wrath ${snapshot.ai_god?.wrath ?? "-"}`,
      ];
      ui.status.textContent = lines.join("\n");
    }

    function renderNarrativeLogs(logs) {
      const narrativeLogs = logs.filter((log) => {
        const text = getNarrative(log);
        return text && (log.actor === "human" || log.actor === "ai_god");
      });

      if (!narrativeLogs.length) {
        ui.turnLog.innerHTML = "<li>서사가 아직 기록되지 않았다.</li>";
        return;
      }

      ui.turnLog.innerHTML = narrativeLogs
        .map((log) => {
          const speaker = log.actor === "human" ? "인간" : "신";
          const text = getNarrative(log);
          return `<li><strong>${speaker}</strong> ${text}</li>`;
        })
        .join("");
    }

    function render() {
      renderStatus(model.snapshot);
      renderNarrativeLogs(model.logs);
      ui.epilogue.textContent = computeEpilogue(model.logs);
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "request failed");
      }
      return data;
    }

    async function resetToFreshState() {
      const data = await fetchJson(API.reset, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
      });
      model.snapshot = data.state || null;
      model.logs = data.logs || [];
    }

    async function refreshState() {
      const data = await fetchJson(API.state);
      model.snapshot = data.state || null;
      model.logs = data.logs || [];
    }

    async function runTurn(action) {
      const result = await fetchJson(API.turn, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action }),
      });
      model.snapshot = result.state || model.snapshot;
      model.logs = result.logs || model.logs;
      render();
    }

    function bindActions() {
      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          button.disabled = true;
          try {
            await runTurn(button.dataset.action);
          } catch (error) {
            ui.epilogue.textContent = `오류: ${error.message}`;
          } finally {
            button.disabled = false;
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      bindActions();
      try {
        await resetToFreshState();
        await refreshState();
        render();
      } catch (error) {
        ui.status.textContent = "상태 초기화 실패";
        ui.epilogue.textContent = `오류: ${error.message}`;
      }
    });
  </script>
</body>
</html>
